services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: map_db
    restart: always
    environment:
      POSTGRES_USER: mapuser
      POSTGRES_PASSWORD: mappassword
      POSTGRES_DB: forestmap
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mapuser -d forestmap"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: map_storage
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: supersecretpassword
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    container_name: map_minio_init
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./data/pmtiles:/pmtiles:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set myminio http://minio:9000 admin supersecretpassword
        mc mb --ignore-existing myminio/maps-bucket
        for f in /pmtiles/*.pmtiles; do
          [ -f "$$f" ] || continue
          mc cp "$$f" "myminio/maps-bucket/$$(basename "$$f")"
        done
        echo "MinIO init complete"
    restart: "no"

  martin:
    image: ghcr.io/maplibre/martin:latest
    container_name: martin_server
    restart: always
    ports:
      - "3000:3000"
    environment:
      AWS_ENDPOINT_URL: "http://minio:9000"
      AWS_ACCESS_KEY_ID: "admin"
      AWS_SECRET_ACCESS_KEY: "supersecretpassword"
      AWS_REGION: "us-east-1"
    command: ["--config", "/config/config.yaml", "--on-invalid", "warn"]
    volumes:
      - ./martin-config.yaml:/config/config.yaml:ro
    depends_on:
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/catalog"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: map_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_USER: "mapuser"
      DB_PASSWORD: "mappassword"
      DB_NAME: "forestmap"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "admin"
      MINIO_SECRET_KEY: "supersecretpassword"
      MINIO_BUCKET_NAME: "maps-bucket"
      MINIO_SECURE: "False"
      MINIO_EXTERNAL_URL: "http://localhost:9000"
      MARTIN_PUBLIC_URL: "http://localhost:3000"
      BACKEND_CORS_ORIGINS: '["http://localhost:5173", "http://localhost:8080"]'
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: map_frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

  frontend-admin:
    build:
      context: ./frontend_admin
      dockerfile: Dockerfile
    container_name: map_frontend_admin
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4
    container_name: map_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: "admin@admin.com"
      PGADMIN_DEFAULT_PASSWORD: "admin"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
  minio_data:
  pgadmin_data: