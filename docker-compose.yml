version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: map_db
    restart: always
    environment:
      POSTGRES_USER: mapuser
      POSTGRES_PASSWORD: mappassword
      POSTGRES_DB: forestmap
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  minio:
    image: minio/minio
    container_name: map_storage
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: supersecretpassword
    ports:
      - "9000:9000" # Порт для API
      - "9001:9001" # Порт для веб-интерфейса
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: map_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=postgres 
      - DB_PORT=5432
      - DB_USER=mapuser
      - DB_PASSWORD=mappassword
      - DB_NAME=forestmap

      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=supersecretpassword
      - MINIO_BUCKET_NAME=maps-bucket
      - MINIO_SECURE=False
    depends_on:
      - postgres
      - minio

volumes:
  pg_data:
  minio_data: