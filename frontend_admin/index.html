<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Admin</title>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="app-header">
        <span class="app-title">Graph Admin</span>
    </header>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="section-label">Карта</div>
            <select id="map-select" class="select">
                <option value="">— выберите карту —</option>
            </select>

            <div class="section-label">Режим</div>
            <div class="btn-group">
                <button class="btn btn--active" data-mode="add-node" type="button">Вершина</button>
                <button class="btn" data-mode="connect" type="button">Соединить</button>
            </div>
            <div class="btn-group">
                <button class="btn" data-mode="select" type="button">Выбрать</button>
                <button class="btn" data-mode="delete" type="button">Удалить</button>
            </div>

            <div class="divider"></div>
            <div class="section-label">Вершина</div>
            <div id="node-panel" class="panel hidden">
                <label class="field">
                    <span>ID</span>
                    <input id="node-id" type="text" readonly>
                </label>
                <label class="field">
                    <span>Lat</span>
                    <input id="node-lat" type="number" step="any">
                </label>
                <label class="field">
                    <span>Lon</span>
                    <input id="node-lon" type="number" step="any">
                </label>
                <label class="field">
                    <span>Проходимость</span>
                    <select id="node-walkable">
                        <option value="true">Да</option>
                        <option value="false">Нет</option>
                    </select>
                </label>
                <label class="field">
                    <span>Тerrain</span>
                    <select id="node-terrain">
                        <option value="dirt_trail">dirt_trail</option>
                        <option value="dirt">dirt</option>
                        <option value="grass">grass</option>
                        <option value="shallow_water">shallow_water</option>
                        <option value="deep_water">deep_water</option>
                        <option value="ice">ice</option>
                        <option value="snow">snow</option>
                        <option value="swamp">swamp</option>
                        <option value="dense_forest">dense_forest</option>
                        <option value="mountains">mountains</option>
                    </select>
                </label>
                <button id="apply-node-btn" class="btn" type="button">Применить</button>
            </div>
            <div id="no-selection" class="hint">Выберите вершину на карте</div>

            <div class="divider"></div>
            <div class="section-label">Рёбра</div>
            <div id="edge-panel" class="panel hidden">
                <label class="field">
                    <span>ID</span>
                    <input id="edge-id" type="text" readonly>
                </label>
                <label class="field">
                    <span>Источник → Цель</span>
                    <input id="edge-endpoints" type="text" readonly>
                </label>
                <label class="field">
                    <span>Вес</span>
                    <input id="edge-weight" type="number" step="0.1" min="0.1">
                </label>
                <button id="apply-edge-btn" class="btn" type="button">Применить</button>
            </div>

            <div class="divider"></div>
            <div class="stats" id="stats">0 вершин · 0 рёбер</div>
            <div class="stats" id="pending-stats"></div>

            <button id="push-btn" class="btn btn--primary" type="button" disabled>
                Сохранить на сервер
            </button>
            <button id="reload-btn" class="btn" type="button">Перезагрузить</button>
        </aside>

        <div id="map" class="map-area"></div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
